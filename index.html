<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game POS</title>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1><i class="fa-solid fa-dice"></i> PG BOARD GAME</h1>
        </div>
        <div class="cart-status">
            <i class="fa-solid fa-basket-shopping"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="ຄົ້ນຫາບອດເກມ..." onkeyup="filterProducts()">
            </div>
            <div class="products" id="product-list"></div>
        </div>

        <div class="checkout-panel">
            <h2><i class="fa-solid fa-shopping-cart"></i> ຂໍ້ມູນການສັ່ງຊື້</h2>
            <input type="text" id="custName" placeholder="ຊື່ ແລະ ນາມສະກຸນ">
            <input type="text" id="custTel" placeholder="ເບີໂທລະສັບ">
            <textarea id="custLoc" placeholder="ທີ່ຢູ່ຈັດສົ່ງ"></textarea>
            
            <div class="coupon-area">
                <input type="text" id="coupon-input" placeholder="ລະຫັດສ່ວນຫຼຸດ">
                <button onclick="applyCoupon()">ໃຊ້ໂຄ້ດ</button>
            </div>
            <p id="coupon-msg"></p>

            <div class="summary-box">
                <div id="cart-display-list">
                    <p style="text-align:center; color:#999;">ຍັງບໍ່ມີສິນຄ້າ...</p>
                </div>
                <hr>
                <div class="total-row">
                    <span>ສ່ວນຫຼຸດ:</span>
                    <span id="discount-text">0 ກີບ</span>
                </div>
                <div class="total-row grand-total">
                    <span>ລວມທັງໝົດ:</span>
                    <span id="final-total-text">0 ກີບ</span>
                </div>
            </div>

            <button class="btn-confirm" onclick="confirmPurchase()">
                <i class="fa-solid fa-check-circle"></i> ຢືນຢັນສັ່ງຊື້ & ອອກບິນ
            </button>
            <button class="btn-clear" onclick="resetCart()">ລ້າງກະຕ່າ</button>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3><i class="fa-solid fa-address-book"></i> ຕິດຕໍ່ພວກເຮົາ</h3>
                <p><i class="fa-solid fa-location-dot"></i> ທີ່ຢູ່: ບ້ານດົງໂດກ, ເມືອງໄຊທານີ, ນະຄອນຫຼວງວຽງຈັນ</p>
                <p><i class="fa-solid fa-phone"></i> ໂທ: 020 9988 7766</p>
            </div>
            <div class="footer-section">
                <h3><i class="fa-solid fa-hashtag"></i> ຕິດຕາມພວກເຮົາ</h3>
                <a href="#"><i class="fa-brands fa-facebook"></i> PG Board Game Shop</a>
                <a href="#"><i class="fa-brands fa-line"></i> @pgboardgame</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 PG Board Game. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
