<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ໃບບິນຮັບເງິນ — PG Board Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="receipt-page">
    <div class="bill-container">
        <div class="receipt-header">
            <i class="fa-solid fa-circle-check" style="font-size: 3rem; color: #10b981;"></i>
            <h2 style="margin-top: 10px;">ໃບບິນຮັບເງິນ</h2>
            <p>PG Board Game Shop</p>
        </div>

        <div id="display-info" class="receipt-info"></div>
        <div id="display-items"></div>
        <div id="display-total" class="receipt-total"></div>

        <div class="no-print receipt-actions">
            <button class="btn-confirm" onclick="window.print()">
                <i class="fa-solid fa-print"></i> ພິມໃບບິນ
            </button>
            <button class="btn-clear" onclick="location.href='index.html'">
                <i class="fa-solid fa-arrow-left"></i> ກັບຄືນໜ້າຫຼັກ
            </button>
        </div>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('myOrder'));
        if (data) {
            document.getElementById('display-info').innerHTML = `
                <p><b>ວັນທີ:</b> ${data.date}</p>
                <p><b>ລູກຄ້າ:</b> ${data.name}</p>
                <p><b>ເບີໂທ:</b> ${data.tel}</p>
                <p><b>ທີ່ຢູ່:</b> ${data.loc}</p>
            `;
            let html = "";
            data.items.forEach(i => {
                html += `
                    <div class="receipt-item">
                        <span>${i.name} (×${i.quantity})</span>
                        <span>${(i.price * i.quantity).toLocaleString()} ກີບ</span>
                    </div>
                `;
            });
            document.getElementById('display-items').innerHTML = html;
            document.getElementById('display-total').innerText = "ລວມທັງໝົດ: " + data.total;
        }
    </script>
</body>
</html>
